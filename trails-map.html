<title>Hiking & Cycling Trails — Neustadt · Deidesheim · Bad Dürkheim</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #e84c6a;
    --accent-light: rgba(232, 76, 106, 0.08);
    --accent-hover: rgba(232, 76, 106, 0.12);
    --text-primary: #2c3345;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --bg-white: #ffffff;
    --bg-light: #f8f9fb;
    --bg-card: #ffffff;
    --border: #e8eaef;
    --border-light: #f0f1f5;
    --shadow-sm: 0 1px 3px rgba(44,51,69,0.06);
    --shadow-md: 0 4px 16px rgba(44,51,69,0.08);
    --shadow-lg: 0 8px 32px rgba(44,51,69,0.1);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; background: var(--bg-light); color: var(--text-primary); }

  #map { width: 100%; height: 100vh; }

  /* ── Header ── */
  .header-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: var(--bg-white);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    box-shadow: var(--shadow-sm); border-bottom: 1px solid var(--border);
  }
  .header-bar h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 20px; color: var(--text-primary); font-weight: 400; letter-spacing: -0.3px;
  }
  .header-bar .subtitle { font-size: 12px; color: var(--text-muted); font-weight: 400; letter-spacing: 0.5px; text-transform: uppercase; }
  .header-logo {
    width: 36px; height: 36px; border-radius: 10px; background: var(--accent-light);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .header-logo svg { width: 20px; height: 20px; }

  /* ── Sidebar toggle ── */
  .legend-toggle {
    position: fixed; top: 64px; right: 12px; z-index: 1001;
    background: var(--bg-white); color: var(--text-primary); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    box-shadow: var(--shadow-sm); transition: all 0.2s;
  }
  .legend-toggle:hover { background: var(--bg-light); box-shadow: var(--shadow-md); }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed; top: 54px; right: 0; width: 400px; height: calc(100vh - 54px);
    background: var(--bg-white); z-index: 999; overflow-y: auto;
    border-left: 1px solid var(--border); transition: transform 0.3s ease;
  }
  .sidebar.hidden { transform: translateX(100%); }
  .sidebar h2 {
    padding: 20px 24px 12px; color: var(--text-primary); font-family: 'DM Serif Display', serif;
    font-size: 18px; font-weight: 400; border-bottom: 1px solid var(--border-light); margin-bottom: 0;
  }

  .filter-bar {
    padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--border-light);
  }
  .filter-btn {
    padding: 6px 16px; border-radius: 24px; border: 1px solid var(--border);
    background: var(--bg-white); color: var(--text-secondary); font-size: 12px;
    font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .filter-btn.active {
    border-color: var(--accent); color: var(--accent); background: var(--accent-light);
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Trail cards ── */
  .trail-card {
    margin: 12px 16px; padding: 20px 24px; background: var(--bg-card);
    border: 1px solid var(--border-light); border-radius: var(--radius); cursor: pointer;
    transition: all 0.25s ease; position: relative;
  }
  .trail-card:hover { border-color: var(--border); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .trail-card.active { border-color: var(--accent); box-shadow: 0 4px 20px rgba(232,76,106,0.1); }

  .trail-card .card-icon {
    width: 40px; height: 40px; margin-bottom: 14px;
  }
  .trail-card .card-icon svg { width: 40px; height: 40px; stroke: var(--accent); fill: none; stroke-width: 1.5; }

  .trail-card .name {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 18px; font-weight: 400; color: var(--text-primary);
    margin-bottom: 6px; line-height: 1.2;
  }

  .trail-card .meta-line {
    font-size: 11px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 1.2px; font-weight: 500; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .trail-card .meta-line .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }

  .trail-card .description {
    font-size: 14px; color: var(--text-secondary); line-height: 1.6;
    font-weight: 400; margin-bottom: 14px;
  }

  .trail-card .stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    border-top: 1px solid var(--border-light); padding-top: 14px;
  }
  .stat { text-align: center; }
  .stat:not(:last-child) { border-right: 1px solid var(--border-light); }
  .stat .value { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .stat .unit { font-size: 11px; font-weight: 400; color: var(--text-muted); }
  .stat .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; margin-top: 2px; }

  .elevation-chart {
    margin-top: 14px; background: var(--bg-light); border-radius: 8px;
    padding: 8px; height: 56px; position: relative; overflow: hidden;
  }
  .elevation-chart canvas { width: 100%; height: 100%; }

  /* ── Map popups ── */
  .popup-content { font-family: 'DM Sans', sans-serif; }
  .popup-content h3 { font-family: 'DM Serif Display', serif; color: var(--text-primary); font-size: 15px; font-weight: 400; margin-bottom: 6px; }
  .popup-content p { color: var(--text-secondary); font-size: 12px; margin: 3px 0; line-height: 1.5; }
  .popup-content .pop-stat { font-weight: 600; color: var(--text-primary); }
  .popup-content .pop-accent { color: var(--accent); font-weight: 600; }

  /* ── City markers ── */
  .city-icon {
    background: var(--bg-white); color: var(--text-primary); padding: 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow-md); font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.2px;
  }
  .city-icon .city-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 6px; vertical-align: middle; }

  .leaflet-popup-content-wrapper { border-radius: var(--radius); box-shadow: var(--shadow-lg); border: 1px solid var(--border-light); }
  .leaflet-popup-tip { box-shadow: none; }

  /* ── Layer control ── */
  .leaflet-control-layers {
    background: var(--bg-white) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    color: var(--text-primary) !important;
    box-shadow: var(--shadow-md) !important;
    padding: 10px 14px !important;
    font-size: 12px !important;
    font-family: 'DM Sans', sans-serif !important;
  }
  .leaflet-control-layers-separator { border-top: 1px solid var(--border-light) !important; margin: 8px 0 !important; }
  .leaflet-control-layers label { color: var(--text-secondary) !important; margin-bottom: 4px; display: block; font-size: 12px !important; }
  .leaflet-control-layers-toggle { width: 36px !important; height: 36px !important; }

  /* ── Scrollbar ── */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 768px) {
    .sidebar { width: 100%; top: auto; bottom: 0; height: 50vh; border-left: none; border-top: 1px solid var(--border); }
    .sidebar.hidden { transform: translateY(100%); }
    .header-bar h1 { font-size: 16px; }
  }
</style>
</head>

  center: [49.41, 8.17],
  zoom: 13,
  zoomControl: false

L.control.zoom({ position: 'bottomright' }).addTo(map);

// ============ TILE LAYERS — landscape style ============

// 1. Esri World Topo — rich landscape colors, terrain shading, labels
const esriTopo = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© Esri, HERE, Garmin, OpenStreetMap contributors',
  maxZoom: 18
});

// 2. OpenTopoMap — classic topo with contour lines
const osmTopo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenTopoMap contributors',
  maxZoom: 17
});

// 3. Esri World Imagery — satellite/aerial photo
const esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© Esri, Maxar, Earthstar Geographics',
  maxZoom: 18
});

// 4. Standard OSM
const osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19
});

// 5. Esri terrain/hillshade overlay (semi-transparent on top of any base)
const hillshade = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© Esri',
  maxZoom: 18,
  opacity: 0.25
});

// 6. Waymarked Trails — hiking overlay showing official marked paths
const hikingOverlay = L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png', {
  attribution: '© Waymarked Trails',
  maxZoom: 18,
  opacity: 0.6
});

// 7. Waymarked Trails — cycling overlay
const cyclingOverlay = L.tileLayer('https://tile.waymarkedtrails.org/cycling/{z}/{x}/{y}.png', {
  attribution: '© Waymarked Trails',
  maxZoom: 18,
  opacity: 0.6
});

// Default: landscape topo
esriTopo.addTo(map);

L.control.layers({
  '🏔️ Landscape': esriTopo,
  '📐 Topographic': osmTopo,
  '🛰️ Satellite': esriSatellite,
  '🗺️ Standard': osmStandard
}, {
  '▓ Hillshade': hillshade,
  '🥾 Hiking paths (official)': hikingOverlay,
  '🚲 Cycling paths (official)': cyclingOverlay
}, { position: 'topright', collapsed: false }).addTo(map);

// Scale bar
L.control.scale({ position: 'bottomleft', metric: true, imperial: false }).addTo(map);

// ============ CITIES ============
const cities = [
  { name: 'Neustadt a.d. Weinstraße', lat: 49.3535, lng: 8.1392, pop: '53,000', elev: '142m' },
  { name: 'Deidesheim', lat: 49.4117, lng: 8.1847, pop: '3,800', elev: '117m' },
  { name: 'Bad Dürkheim', lat: 49.4617, lng: 8.1722, pop: '19,500', elev: '132m' }
];

cities.forEach(city => {
  const icon = L.divIcon({
    className: 'city-marker',
    html: `<div class="city-icon"><span class="city-dot"></span>${city.name}</div>`,
    iconSize: [0, 0],
    iconAnchor: [-10, 20]
  });
  L.marker([city.lat, city.lng], { icon })
    .addTo(map)
    .bindPopup(`
      <div class="popup-content">
        <h3>${city.name}</h3>
        <p>Population: <span class="pop-stat">${city.pop}</span></p>
        <p>Elevation: <span class="pop-stat">${city.elev}</span></p>
      </div>
    `);
});

function renderTrailList(filter = 'all') {
  const container = document.getElementById('trail-list');
  container.innerHTML = '';

  const filtered = filter === 'all' ? trails : trails.filter(t => t.type === filter);
  const diffLabel = { easy: 'Leicht', moderate: 'Mittel', hard: 'Schwer' };

  filtered.forEach(trail => {
    const card = document.createElement('div');
    card.className = 'trail-card';
    card.id = `card-${trail.id}`;

    card.innerHTML = `
      <div class="card-icon">${trailIcons[trail.type] || trailIcons.hiking}</div>
      <div class="name">${trail.name}</div>
      <div class="meta-line">
        <span>${trail.distance} KM</span>
        <span class="dot"></span>
        <span>${diffLabel[trail.difficulty]}</span>
      </div>
      <div class="description">${trail.description}</div>
      <div class="stats">
        <div class="stat">
          <div class="value">${trail.duration}</div>
          <div class="label">Dauer</div>
        </div>
        <div class="stat">
          <div class="value">${trail.elevGain}<span class="unit"> m</span></div>
          <div class="label">Anstieg</div>
        </div>
        <div class="stat">
          <div class="value">${trail.elevLoss}<span class="unit"> m</span></div>
          <div class="label">Abstieg</div>
        </div>
      </div>
      <div class="elevation-chart"><canvas id="elev-${trail.id}"></canvas></div>
    `;

    card.addEventListener('click', () => {
      document.querySelectorAll('.trail-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');

      // Highlight trail on map
      Object.values(trailLayers).forEach(({ polyline }) => {
        polyline.setStyle({ weight: 3.5, opacity: 0.35 });
      });
      trailLayers[trail.id].polyline.setStyle({ weight: 5, opacity: 1 });
      trailLayers[trail.id].polyline.openPopup();

      map.fitBounds(trailLayers[trail.id].polyline.getBounds(), { padding: [60, 60] });
    });

    container.appendChild(card);

    // Draw elevation mini-chart
    setTimeout(() => drawElevation(trail), 50);
  });
}

function drawElevation(trail) {
  const canvas = document.getElementById(`elev-${trail.id}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  ctx.scale(2, 2);

  const w = rect.width;
  const h = rect.height;
  const data = trail.elevProfile;
  const min = Math.min(...data) - 20;
  const max = Math.max(...data) + 20;

  ctx.beginPath();
  ctx.moveTo(0, h);
  data.forEach((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / (max - min)) * (h - 4);
    if (i === 0) ctx.lineTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.lineTo(w, h);
  ctx.closePath();

  const gradient = ctx.createLinearGradient(0, 0, 0, h);
  gradient.addColorStop(0, 'rgba(232,76,106,0.18)');
  gradient.addColorStop(1, 'rgba(232,76,106,0.02)');
  ctx.fillStyle = gradient;
  ctx.fill();

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / (max - min)) * (h - 4);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#e84c6a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Min/max labels
  ctx.font = '9px DM Sans, sans-serif';
  ctx.fillStyle = '#9ca3af';
  ctx.fillText(`${Math.min(...data)}m`, 2, h - 4);
  ctx.fillText(`${Math.max(...data)}m`, w - 32, 12);
}

function filterTrails(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Show/hide trail layers
  Object.values(trailLayers).forEach(({ polyline, trail }) => {
    if (type === 'all' || trail.type === type) {
      polyline.setStyle({ opacity: 0.85 });
      map.addLayer(polyline);
    } else {
      polyline.setStyle({ opacity: 0.15 });
    }
  });

  renderTrailList(type);
}
